name: Test Gate

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate shell scripts
        run: |
          bash -n install.sh && echo "install.sh: syntax OK"
          bash -n uninstall.sh && echo "uninstall.sh: syntax OK"
          find scripts/ -name "*.sh" -exec bash -n {} \; -exec echo "{}: syntax OK" \;

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Check JS syntax
        run: |
          node --check bin/doctor.js && echo "bin/doctor.js: syntax OK"
          find scripts/ -name "*.js" -exec node --check {} \; -exec echo "{}: syntax OK" \;

      - name: Validate package.json
        run: |
          node -e "JSON.parse(require('fs').readFileSync('package.json','utf8'))" && echo "package.json OK"
