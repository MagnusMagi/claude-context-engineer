name: Auto-Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to VPS
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

          ssh -i ~/.ssh/deploy_key "$VPS_USER@$VPS_HOST" \
            "cd $DEPLOY_PATH && git pull origin main"

      - name: Verify deployment
        if: success()
        run: echo "✅ Deployed ${{ github.sha }} to ${{ secrets.VPS_HOST }}:${{ secrets.DEPLOY_PATH }}"

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Deploy failed for ${{ github.sha }}"
          exit 1
