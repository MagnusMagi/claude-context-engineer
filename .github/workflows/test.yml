name: Test Gate

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run ESLint
        run: npm run lint --if-present || true

      - name: Check formatting (prettier)
        run: npx prettier --check . --ignore-path .gitignore || true

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: TypeScript type check
        run: npm run type-check --if-present || true

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test --if-present || echo "No tests configured"

  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Validate package.json
        run: |
          npm ls 2>&1 | head -50 || true

      - name: Check install script
        run: |
          [ -f install.sh ] && bash -n install.sh && echo "install.sh: syntax OK" || true
          [ -f uninstall.sh ] && bash -n uninstall.sh && echo "uninstall.sh: syntax OK" || true
