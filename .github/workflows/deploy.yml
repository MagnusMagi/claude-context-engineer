name: Auto-Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to VPS
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

          ssh -i ~/.ssh/deploy_key "$VPS_USER@$VPS_HOST" \
            "cd $DEPLOY_PATH && git pull origin main && npm install --production && npm run build --if-present && pm2 restart all"

      - name: Verify deployment
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key "$VPS_USER@$VPS_HOST" \
            "pm2 list | grep -E '(online|stopped)' && curl -s http://localhost:8088/api/health || echo 'Health check pending'"

      - name: Notify on deployment
        if: success()
        run: |
          echo "✅ Deployment successful for ${{ github.sha }}"
          echo "Repository: ${{ github.repository }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.event.head_commit.message }}"

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Deployment failed for ${{ github.sha }}"
          exit 1
